<h2>Product Management</h2>
<button [routerLink]="['/ex50/add']">Create New</button>
<p style="color:red" *ngIf="errMessage">{{errMessage}}</p>
<p *ngIf="!books && !errMessage">Loading...</p>
<p *ngIf="books && books.length === 0">No books found.</p>
<table border="1">
    <thead>
        <tr>
            <td>Tensach</td>
            <td>Giaban</td>
            <td>Mota</td>
            <td>Anhbia</td>
            <td>Ngaycapnhat</td>
            <td>Soluongton</td>
            <td>MaCD</td>
            <td>MaNXB</td>
            <td>Action:</td>
        </tr>
    <tbody>
        <tr *ngFor="let book of books">
            <td>{{book.BookName}}</td>
            <td>{{book.Price}}</td>
            <td>{{book.Description}}</td>
            <td>
                <img [src]="getImageUrl(book.Image)" (error)="handleImageError($event)"
                     width="50" height="50" style="object-fit: contain;">
            </td>
            <td>{{book.UpdateDate}}</td>
            <td>{{book.Quantity}}</td>
            <td>{{book.TopicId}}</td>
            <td>{{book.PublisherId}}</td>
            <td>
                <a [routerLink]="['/ex50/edit', book.BookId]">Update</a> | <a (click)="deleteBook(book.BookId)"
                    style="cursor:pointer">Delete</a>
            </td>
        </tr>
    </tbody>
</table>
